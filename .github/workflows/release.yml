name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    outputs:
      artifact-name: newgodwar-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs/NewGodWar-*.jar
          if-no-files-found: error

  smoke:
    name: Paper ${{ matrix.minecraft }} / Java ${{ matrix.java }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.12.2"
            java: "8"
          - minecraft: "1.16.5"
            java: "11"
          - minecraft: "1.17.1"
            java: "17"
          - minecraft: "1.18.2"
            java: "17"
          - minecraft: "1.19.4"
            java: "17"
          - minecraft: "1.20.6"
            java: "21"
          - minecraft: "1.21.1"
            java: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Smoke test plugin startup
        shell: pwsh
        run: |
          $jar = (Get-ChildItem -Path build/libs -Filter 'NewGodWar-*.jar' | Select-Object -First 1).FullName
          ./scripts/Test-PaperMatrix.ps1 -SkipBuild -Versions "${{ matrix.minecraft }}" -PluginJar $jar -TimeoutSeconds 180

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-smoke-${{ matrix.minecraft }}-java-${{ matrix.java }}
          path: .paper-smoke/**
          if-no-files-found: ignore

  release:
    name: Create GitHub release
    needs:
      - build
      - smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: release-artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/NewGodWar-*.jar --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/NewGodWar-*.jar \
              --title "NewGodWar $RELEASE_TAG" \
              --generate-notes
          fi
