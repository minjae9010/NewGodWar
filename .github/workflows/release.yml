name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    outputs:
      artifact-name: newgodwar-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs/NewGodWar-*.jar
          if-no-files-found: error

  smoke:
    name: Paper ${{ matrix.minecraft }} / Java ${{ matrix.java }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
