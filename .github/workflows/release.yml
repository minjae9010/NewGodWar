name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Resolve release
    runs-on: ubuntu-latest

    outputs:
      checkout-ref: ${{ steps.release.outputs.checkout-ref }}
      release-tag: ${{ steps.release.outputs.release-tag }}
      should-release: ${{ steps.release.outputs.should-release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: release
        shell: bash
        run: |
          should_release=true

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
            checkout_ref="${release_tag}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          else
            version="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' build.gradle | head -n 1)"
            if [ -z "$version" ]; then
              echo "Could not resolve project version from build.gradle" >&2
              exit 1
            fi

            release_tag="v${version}"
            checkout_ref="${GITHUB_SHA}"

            if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
              echo "Release tag ${release_tag} already exists; skipping automatic release."
              should_release=false
            fi
          fi

          echo "checkout-ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "should-release=${should_release}" >> "$GITHUB_OUTPUT"

  build:
    name: Build plugin
    needs: preflight
    if: needs.preflight.outputs.should-release == 'true'
    runs-on: ubuntu-latest

    outputs:
      artifact-name: newgodwar-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.checkout-ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs/NewGodWar-*.jar
          if-no-files-found: error

  smoke:
    name: Paper ${{ matrix.minecraft }} / Java ${{ matrix.java }}
    needs:
      - preflight
      - build
    if: needs.preflight.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.12"
            java: "8"
          - minecraft: "1.12.1"
            java: "8"
          - minecraft: "1.12.2"
            java: "8"
          - minecraft: "1.13"
            java: "8"
          - minecraft: "1.13.1"
            java: "8"
          - minecraft: "1.13.2"
            java: "8"
          - minecraft: "1.14"
            java: "8"
          - minecraft: "1.14.1"
            java: "8"
          - minecraft: "1.14.2"
            java: "8"
          - minecraft: "1.14.3"
            java: "8"
          - minecraft: "1.14.4"
            java: "8"
          - minecraft: "1.15"
            java: "8"
          - minecraft: "1.15.1"
            java: "8"
          - minecraft: "1.15.2"
            java: "8"
          - minecraft: "1.16.1"
            java: "8"
          - minecraft: "1.16.2"
            java: "8"
          - minecraft: "1.16.3"
            java: "8"
          - minecraft: "1.16.4"
            java: "8"
          - minecraft: "1.16.5"
            java: "8"
          - minecraft: "1.17"
            java: "17"
          - minecraft: "1.17.1"
            java: "17"
          - minecraft: "1.18"
            java: "17"
          - minecraft: "1.18.1"
            java: "17"
          - minecraft: "1.18.2"
            java: "17"
          - minecraft: "1.19"
            java: "17"
          - minecraft: "1.19.1"
            java: "17"
          - minecraft: "1.19.2"
            java: "17"
          - minecraft: "1.19.3"
            java: "17"
          - minecraft: "1.19.4"
            java: "17"
          - minecraft: "1.20"
            java: "17"
          - minecraft: "1.20.1"
            java: "17"
          - minecraft: "1.20.2"
            java: "17"
          - minecraft: "1.20.4"
            java: "17"
          - minecraft: "1.20.5"
            java: "21"
          - minecraft: "1.20.6"
            java: "21"
          - minecraft: "1.21"
            java: "21"
          - minecraft: "1.21.1"
            java: "21"
          - minecraft: "1.21.3"
            java: "21"
          - minecraft: "1.21.4"
            java: "21"
          - minecraft: "1.21.5"
            java: "21"
          - minecraft: "1.21.6"
            java: "21"
          - minecraft: "1.21.7"
            java: "21"
          - minecraft: "1.21.8"
            java: "21"
          - minecraft: "1.21.9"
            java: "21"
          - minecraft: "1.21.10"
            java: "21"
          - minecraft: "1.21.11"
            java: "21"
          - minecraft: "26.1.1"
            java: "21"
          - minecraft: "26.1.2"
            java: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout-ref }}

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Smoke test plugin startup
        shell: pwsh
        run: |
          $jar = (Get-ChildItem -Path build/libs -Filter 'NewGodWar-*.jar' | Select-Object -First 1).FullName
          ./scripts/Test-PaperMatrix.ps1 -SkipBuild -Versions "${{ matrix.minecraft }}" -PluginJar $jar -TimeoutSeconds 180

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-smoke-${{ matrix.minecraft }}-java-${{ matrix.java }}
          path: .paper-smoke/**
          if-no-files-found: ignore

  smoke-latest:
    name: Latest supported Paper / Java 21
    needs:
      - preflight
      - build
    if: needs.preflight.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout-ref }}

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Smoke test latest supported Paper startup
        shell: pwsh
        run: |
          $jar = (Get-ChildItem -Path build/libs -Filter 'NewGodWar-*.jar' | Select-Object -First 1).FullName
          ./scripts/Test-PaperMatrix.ps1 -SkipBuild -LatestVersion -PluginJar $jar -TimeoutSeconds 180

      - name: Upload latest smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-smoke-latest
          path: .paper-smoke/**
          if-no-files-found: ignore

  release:
    name: Create GitHub release
    needs:
      - preflight
      - build
      - smoke-latest
    if: needs.preflight.outputs.should-release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.checkout-ref }}

      - name: Ensure release tag exists
        shell: bash
        run: |
          release_tag="${{ needs.preflight.outputs.release-tag }}"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${release_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${release_tag}"

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: release-artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release-tag }}
        shell: bash
        run: |
          notes_args=(--generate-notes)
          notes_file="docs/releases/${RELEASE_TAG}.md"
          if [ -f "$notes_file" ]; then
            notes_args=(--notes-file "$notes_file")
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/NewGodWar-*.jar --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/NewGodWar-*.jar \
              --title "NewGodWar $RELEASE_TAG" \
              "${notes_args[@]}"
          fi
