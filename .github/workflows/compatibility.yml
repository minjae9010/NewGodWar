name: Compatibility

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs/NewGodWar-*.jar
          if-no-files-found: error

  smoke:
    name: Paper ${{ matrix.minecraft }} / Java ${{ matrix.java }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.12"
            java: "8"
          - minecraft: "1.12.1"
            java: "8"
          - minecraft: "1.12.2"
            java: "8"
          - minecraft: "1.13"
            java: "8"
          - minecraft: "1.13.1"
            java: "8"
          - minecraft: "1.13.2"
            java: "8"
          - minecraft: "1.14"
            java: "8"
          - minecraft: "1.14.1"
            java: "8"
          - minecraft: "1.14.2"
            java: "8"
          - minecraft: "1.14.3"
            java: "8"
          - minecraft: "1.14.4"
            java: "8"
          - minecraft: "1.15"
            java: "8"
          - minecraft: "1.15.1"
            java: "8"
          - minecraft: "1.15.2"
            java: "8"
          - minecraft: "1.16.1"
            java: "8"
          - minecraft: "1.16.2"
            java: "8"
          - minecraft: "1.16.3"
            java: "8"
          - minecraft: "1.16.4"
            java: "8"
          - minecraft: "1.16.5"
            java: "8"
          - minecraft: "1.17"
            java: "17"
          - minecraft: "1.17.1"
            java: "17"
          - minecraft: "1.18"
            java: "17"
          - minecraft: "1.18.1"
            java: "17"
          - minecraft: "1.18.2"
            java: "17"
          - minecraft: "1.19"
            java: "17"
          - minecraft: "1.19.1"
            java: "17"
          - minecraft: "1.19.2"
            java: "17"
          - minecraft: "1.19.3"
            java: "17"
          - minecraft: "1.19.4"
            java: "17"
          - minecraft: "1.20"
            java: "17"
          - minecraft: "1.20.1"
            java: "17"
          - minecraft: "1.20.2"
            java: "17"
          - minecraft: "1.20.4"
            java: "17"
          - minecraft: "1.20.5"
            java: "21"
          - minecraft: "1.20.6"
            java: "21"
          - minecraft: "1.21"
            java: "21"
          - minecraft: "1.21.1"
            java: "21"
          - minecraft: "1.21.3"
            java: "21"
          - minecraft: "1.21.4"
            java: "21"
          - minecraft: "1.21.5"
            java: "21"
          - minecraft: "1.21.6"
            java: "21"
          - minecraft: "1.21.7"
            java: "21"
          - minecraft: "1.21.8"
            java: "21"
          - minecraft: "1.21.9"
            java: "21"
          - minecraft: "1.21.10"
            java: "21"
          - minecraft: "1.21.11"
            java: "21"
          - minecraft: "26.1.1"
            java: "21"
          - minecraft: "26.1.2"
            java: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Smoke test plugin startup
        shell: pwsh
        run: |
          $jar = (Get-ChildItem -Path build/libs -Filter 'NewGodWar-*.jar' | Select-Object -First 1).FullName
          ./scripts/Test-PaperMatrix.ps1 -SkipBuild -Versions "${{ matrix.minecraft }}" -PluginJar $jar -TimeoutSeconds 180

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-smoke-${{ matrix.minecraft }}-java-${{ matrix.java }}
          path: .paper-smoke/**
          if-no-files-found: ignore

  smoke-latest:
    name: Latest supported Paper / Java 21
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: newgodwar-plugin
          path: build/libs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Smoke test latest supported Paper startup
        shell: pwsh
        run: |
          $jar = (Get-ChildItem -Path build/libs -Filter 'NewGodWar-*.jar' | Select-Object -First 1).FullName
          ./scripts/Test-PaperMatrix.ps1 -SkipBuild -LatestVersion -PluginJar $jar -TimeoutSeconds 180

      - name: Upload latest smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-smoke-latest
          path: .paper-smoke/**
          if-no-files-found: ignore
