name: Compatibility report
description: 특정 Minecraft/Paper/Java 버전에서의 호환성 문제를 제보합니다.
title: "[Compat] "
labels:
  - compatibility
  - bug
body:
  - type: markdown
    attributes:
      value: |
        버전 호환성 문제는 서버 버전과 Java 버전이 가장 중요합니다.

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft 버전
      placeholder: 예) 1.20.6
    validations:
      required: true

  - type: input
    id: server-software
    attributes:
      label: 서버 구동기
      placeholder: 예) Paper build 151, Spigot, Purpur
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java 버전
      placeholder: 예) Java 17, Java 21
    validations:
      required: true

  - type: input
    id: newgodwar-version
    attributes:
      label: NewGodWar 버전
      placeholder: 예) v0.1.3
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: 문제가 발생한 시점
      options:
        - 서버 시작 / 플러그인 로딩
        - 게임 시작
        - 능력 사용
        - 팀/스폰/코어 처리
        - 게임 종료
        - 기타
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제 내용
      description: 어떤 버전에서 어떤 문제가 발생했는지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 서버 로그
      description: latest.log 또는 콘솔 오류를 붙여 주세요.
      render: text
    validations:
      required: true

  - type: textarea
    id: plugins
    attributes:
      label: 함께 사용 중인 주요 플러그인
      description: 충돌 가능성이 있는 플러그인이 있으면 적어 주세요.
      placeholder: 예) ProtocolLib, WorldEdit, LuckPerms
