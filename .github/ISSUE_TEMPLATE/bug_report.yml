name: Bug report
description: NewGodWar에서 재현 가능한 버그를 제보합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        제보 감사합니다. 가능한 한 재현 방법과 서버 로그를 함께 적어 주세요.

  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 짧게 설명해 주세요.
      placeholder: 예) 게임 시작 시 특정 능력이 배정되면 서버 콘솔에 오류가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 같은 문제를 다시 만들 수 있는 순서를 적어 주세요.
      placeholder: |
        1. /godwar start 실행
        2. 특정 플레이어에게 ... 능력 배정
        3. ... 행동 수행
        4. 오류 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 원래 어떻게 동작해야 한다고 생각했는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떤 일이 일어났는지 적어 주세요.
    validations:
      required: true

  - type: input
    id: newgodwar-version
    attributes:
      label: NewGodWar 버전
      placeholder: 예) v0.1.3
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: 서버 버전
      placeholder: 예) Paper 26.1.2 build 64
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java 버전
      placeholder: 예) Java 21
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 오류 메시지
      description: 서버 콘솔, latest.log, stacktrace를 붙여 주세요.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: 추가 정보
      description: 함께 사용하는 플러그인, 설정 변경, 월드 상태 등 참고할 내용을 적어 주세요.
