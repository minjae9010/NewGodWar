game:
  min-players: 2
  friendly-fire: false
  auto-balance-teams: true
  allow-mid-join: true
  clear-inventory: true
  give-skyblock-items: true
  remove-entities: true
  ignore-bed: true
  fast-start: true
  ready-countdown-seconds: 40
  fast-ready-countdown-seconds: 5
  skip-ready-countdown-seconds: 5
  select-right: true
  ability-reroll-count: 1
  announce-radius: 0
  ability-roll-message: true
  ability-tick-interval-seconds: 1
  urf:
    enabled: false
    cooldown-multiplier: 0.2

world:
  autosave: true
  spawn-animals: false
  spawn-monsters: false
  difficulty: EASY
  start-time: 6000

core:
  protect-diamond-from-explosion: true
  require-empty-hand: true
  forbid-diamond-pickaxe: true

abilities:
  messages:
    enabled: true
    success: true
    failure: true
    timer: true
  nasdaq:
    iron-success-percent: 75
    diamond-success-percent: 25
  voodoo:
    damage: 0.5
    hit-interval-millis: 1000
  darkness:
    incoming-damage-multiplier: 0.25

gambling:
  enabled: true
  cost:
    cobblestone: 32
  rewards:
    normal:
      - chance: 5
        material: DIAMOND
        amount: 3
        message: "&b와우! 축하합니다! 다이아몬드 3개입니다!"
      - chance: 15
        material: OAK_LOG
        legacy-material: LOG
        amount: 3
        message: "&6대박! 짜잔! 원목 3개 당첨 축하드립니다!"
      - chance: 15
        material: BLAZE_ROD
        amount: 1
        messages:
          - "&c꽝!"
          - "&9서버의 신의 자비로 능력의 막대를 드립니다."
      - chance: 45
        material: IRON_INGOT
        amount: 3
        message: "평범하군요! 철괴 3개를 드립니다."
      - chance: 19
        material: IRON_INGOT
        amount: 4
        message: "평범하군요! 철괴 4개를 드립니다."
      - chance: 1
        material: DIAMOND
        amount: 22
        messages:
          - "&e헐... 대박, 당신의 운은 미쳤군요!"
          - "&b다이아몬드 22개에 당첨되셨습니다."
    tajja:
      - chance: 10
        material: DIAMOND
        amount: 3
        message: "&b와우! 축하합니다! 다이아몬드 3개입니다!"
      - chance: 10
        material: OAK_LOG
        legacy-material: LOG
        amount: 3
        message: "&6대박! 짜잔! 원목 3개 당첨 축하드립니다!"
      - chance: 65
        material: IRON_INGOT
        amount: 3
        message: "평범하군요! 철괴 3개를 드립니다."
      - chance: 10
        material: IRON_INGOT
        amount: 4
        message: "평범하군요! 철괴 4개를 드립니다."
      - chance: 5
        material: DIAMOND
        amount: 22
        messages:
          - "&e헐... 대박, 당신의 운은 미쳤군요!"
          - "&b다이아몬드 22개에 당첨되셨습니다."

scoreboard:
  enabled: true
  team-prefixes: true

blacklist:
  abilities: []

tips:
  enabled: true
  show-on-start: true
  lines:
    - "&f블막 조합: &e막대기 2개&7를 일자/사선으로 놓으면 &6블레이즈 막대기 1개&7를 만들 수 있습니다."
    - "&f능력 확인: &b/a&7로 내 능력 설명과 쿨타임을 확인하세요."
    - "&f재추첨: &b/t yes&7로 확정, &c/t no&7로 다시 뽑기를 선택합니다."
    - "&f타깃 능력: &b/x <닉네임>&7으로 대상을 빠르게 지정합니다."
    - "&f팀 설정: &b/godwar settings&7의 팀 메뉴에서 팀 추가, 이름, 색상, 스폰, 심장을 관리할 수 있습니다."
    - "&f비활성 팀: &7비활성화된 팀은 자동 배정, 중간 참여, 시작 검사에서 제외됩니다."
    - "&f우르프: &b/godwar urf 80%&7처럼 쿨타임 감소율을 바로 조정할 수 있습니다."
    - "&f도박: &b/도박&7에서 코블스톤으로 추가 자원을 노려볼 수 있습니다."
    - "&f팀 채팅: &b/tc <내용>&7으로 팀원에게만 말할 수 있습니다."

gamerules:
  enabled: true
  restore-on-stop: true
  rules:
    keepInventory: false
    doImmediateRespawn: true
    doDaylightCycle: false
    doWeatherCycle: false
    naturalRegeneration: true

teams:
  red:
    enabled: true
    display-name: "빨강"
    color: RED
  blue:
    enabled: true
    display-name: "파랑"
    color: BLUE
  green:
    enabled: true
    display-name: "초록"
    color: GREEN

spawns: {}

messages:
  prefix: "&6[신들의 전쟁]&r "
  game-start: "&e전쟁이 시작되었습니다. 각 팀의 신전을 지키고 적의 다이아 심장을 파괴하세요."
  game-stop: "&c전쟁이 종료되었습니다."
  team-eliminated: "&c{team} 팀의 다이아 심장이 파괴되었습니다."
  winner: "&a{team} 팀이 신들의 전쟁에서 승리했습니다!"
