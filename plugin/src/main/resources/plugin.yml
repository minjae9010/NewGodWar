name: NewGodWar
main: kr.newgodwar.NewGodWarPlugin
version: ${version}
author: minjae9010
description: 신들의 전쟁 스타일 팀 기반 미니게임 플러그인
commands:
  godwar:
    aliases: [gw, godswar, 신들의전쟁]
    description: 신들의 전쟁 게임을 관리합니다.
    usage: /gw help
  t:
    description: Themachy 스타일 신들의 전쟁 호환 명령어입니다.
    usage: /t help
  teamchat:
    aliases: [tc, 팀채팅]
    description: 팀원에게만 채팅을 보내거나 팀 채팅 모드를 전환합니다.
    usage: /teamchat [message]
  x:
    description: 타깃형 능력의 대상을 지정합니다.
    usage: /x <player>
  a:
    aliases: [ability, 능력]
    description: 자신의 현재 능력을 확인합니다.
    usage: /a
  gamble:
    aliases: [도박]
    description: 신들의 전쟁 도박 GUI를 엽니다.
    usage: /도박
permissions:
  newgodwar.admin:
    description: 신들의 전쟁 관리자 명령어 권한
    default: op
  newgodwar.play:
    description: 신들의 전쟁 참여 권한
    default: true
